---
- name: IMS Remediation - Kafka-triggered Ansible Lightspeed playbook generation
  hosts: localhost
  sources:
    - ansible.eda.kafka:
        host: ims-release-kafka-kafka-bootstrap.ims-demo-lab.svc.cluster.local
        port: 9092
        topic: aiops-ansible-playbook-generate-instruction
  rules:
    - name: Debug - print all Kafka events
      condition: event.body is defined
      action:
        debug:
          msg: "{{ event }}"

    - name: Trigger playbook generation on anomaly incident
      condition: event.body is search("Generate a reviewable Ansible playbook")
      action:
        run_job_template:
          name: "IMS - Parse and Dispatch Incident"
          organization: "IMS Org"
          job_args:
            extra_vars:
              lightspeed_query: "{{ event.message }}"
              lightspeed_token: "{{ lightspeed_token }}"
              input_lightspeed_url: "{{ input_lightspeed_url | default('https://c.ai.ansible.redhat.com/api/v0/ai/generations/') }}"

