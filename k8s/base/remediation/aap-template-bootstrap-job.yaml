apiVersion: batch/v1
kind: Job
metadata:
  name: ims-remediation-aap-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "33"
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: aap-controller
      initContainers:
        - name: install-deps
          image: python:3.11-slim
          command: ["pip", "install", "--quiet", "--target", "/deps", "requests>=2.31.0"]
          volumeMounts:
            - name: deps
              mountPath: /deps
      containers:
        - name: bootstrap
          image: python:3.11-slim
          command: ["python", "/scripts/main.py"]
          env:
            - name: PYTHONPATH
              value: "/scripts:/deps"
            # AAP_CONTROLLER_PASSWORD is intentionally omitted — bootstrap/aap.py
            # reads the password from the aap-controller-admin-password Secret via
            # the Kubernetes API, exactly like services/shared/aap.py does.
            - name: AAP_CONTROLLER_VERIFY_SSL
              value: "false"
            - name: AAP_PROJECT_SCM_URL
              value: "https://github.com/<your-org>/ims-remediation.git"
            - name: AAP_PROJECT_BRANCH
              value: "main"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: deps
              mountPath: /deps
      volumes:
        - name: scripts
          configMap:
            name: ims-remediation-bootstrap-scripts
        - name: deps
          emptyDir: {}
