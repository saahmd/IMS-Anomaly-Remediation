apiVersion: v1
kind: ServiceAccount
metadata:
  name: ims-remediation-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "31"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ims-remediation-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "31"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - aap-controller-admin-password
      - aap-eda-admin-password
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ims-remediation-bootstrap
  namespace: aap
  annotations:
    argocd.argoproj.io/sync-wave: "31"
subjects:
  - kind: ServiceAccount
    name: ims-remediation-bootstrap
    namespace: aap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ims-remediation-bootstrap
