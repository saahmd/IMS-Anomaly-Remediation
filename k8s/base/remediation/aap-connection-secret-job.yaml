apiVersion: batch/v1
kind: Job
metadata:
  name: ims-remediation-connection-secret
  namespace: aap
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: aap-controller
      containers:
        - name: create-connection-secret
          image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"

              k8s_get() {
                curl -sf --cacert "$CA" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/json" \
                  "${API}${1}"
              }

              echo "[1/3] Reading admin passwords from operator secrets..."

              CONTROLLER_PASSWORD=$(k8s_get "/api/v1/namespaces/aap/secrets/aap-controller-admin-password" \
                | python3 -c "import sys,json,base64; \
                    print(base64.b64decode(json.load(sys.stdin)['data']['password']).decode().strip())")

              EDA_PASSWORD=$(k8s_get "/api/v1/namespaces/aap/secrets/aap-eda-admin-password" \
                | python3 -c "import sys,json,base64; \
                    print(base64.b64decode(json.load(sys.stdin)['data']['password']).decode().strip())")

              echo "[2/3] Discovering AAP service names..."

              SERVICES=$(k8s_get "/api/v1/namespaces/aap/services")

              CONTROLLER_SVC=$(echo "$SERVICES" | python3 -c "
              import sys, json
              for svc in json.load(sys.stdin)['items']:
                  labels = svc.get('metadata', {}).get('labels', {})
                  name   = svc['metadata']['name']
                  if labels.get('app.kubernetes.io/component') == 'automationcontroller' \
                  or 'controller' in name:
                      print(name); break
              ")

              EDA_SVC=$(echo "$SERVICES" | python3 -c "
              import sys, json
              for svc in json.load(sys.stdin)['items']:
                  labels = svc.get('metadata', {}).get('labels', {})
                  name   = svc['metadata']['name']
                  if labels.get('app.kubernetes.io/component') == 'eda' \
                  or ('eda' in name and 'api' in name):
                      print(name); break
              ")

              CONTROLLER_HOST="http://${CONTROLLER_SVC}.aap.svc.cluster.local"
              EDA_HOST="http://${EDA_SVC}.aap.svc.cluster.local"

              echo "  Controller : ${CONTROLLER_HOST}"
              echo "  EDA        : ${EDA_HOST}"

              echo "[3/3] Creating aap-controller-connection secret..."

              # Server-side apply — creates or updates the secret
              python3 - <<PYEOF
              import json, os, subprocess, base64

              secret = {
                  "apiVersion": "v1",
                  "kind": "Secret",
                  "metadata": {
                      "name": "aap-controller-connection",
                      "namespace": "aap"
                  },
                  "stringData": {
                      "host":     os.environ["CONTROLLER_HOST"],
                      "username": "admin",
                      "password": os.environ["CONTROLLER_PASSWORD"]
                  }
              }

              eda_secret = {
                  "apiVersion": "v1",
                  "kind": "Secret",
                  "metadata": {
                      "name": "aap-eda-connection",
                      "namespace": "aap"
                  },
                  "stringData": {
                      "host":     os.environ["EDA_HOST"],
                      "username": "admin",
                      "password": os.environ["EDA_PASSWORD"]
                  }
              }

              token = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
              api   = f"https://{os.environ['KUBERNETES_SERVICE_HOST']}:{os.environ['KUBERNETES_SERVICE_PORT_HTTPS']}"
              ca    = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              import urllib.request, urllib.error, ssl
              ctx = ssl.create_default_context(cafile=ca)

              for s in [secret, eda_secret]:
                  name = s["metadata"]["name"]
                  url  = f"{api}/api/v1/namespaces/aap/secrets/{name}?fieldManager=ims-bootstrap&force=true"
                  data = json.dumps(s).encode()
                  req  = urllib.request.Request(url, data=data, method="PATCH")
                  req.add_header("Authorization", f"Bearer {token}")
                  req.add_header("Content-Type", "application/apply-patch+yaml")
                  try:
                      urllib.request.urlopen(req, context=ctx)
                      print(f"  Secret '{name}' applied.")
                  except urllib.error.HTTPError as e:
                      print(f"  Error applying '{name}': {e.code} {e.read().decode()}")
                      raise
              PYEOF

          env:
            - name: CONTROLLER_HOST
              value: ""   # set dynamically in script above
            - name: CONTROLLER_PASSWORD
              value: ""   # set dynamically in script above
            - name: EDA_HOST
              value: ""
            - name: EDA_PASSWORD
              value: ""
