apiVersion: batch/v1
kind: Job
metadata:
  name: ims-remediation-configure
  namespace: aap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "33"
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: aap-controller
      initContainers:
        - name: read-secrets
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              # Passwords — created automatically by the AAP operator
              oc get secret aap-controller-admin-password -n aap \
                -o jsonpath='{.data.password}' | base64 -d > /secrets/controller-password

              oc get secret aap-eda-admin-password -n aap \
                -o jsonpath='{.data.password}' | base64 -d > /secrets/eda-password

              # Routes — guaranteed reachable from inside the cluster
              oc get route aap-controller -n aap \
                -o jsonpath='https://{.spec.host}' > /secrets/controller-url

              oc get route aap-eda -n aap \
                -o jsonpath='https://{.spec.host}' > /secrets/eda-url

              echo "Secrets and URLs written:"
              echo "  controller-url : $(cat /secrets/controller-url)"
              echo "  eda-url        : $(cat /secrets/eda-url)"
          volumeMounts:
            - name: secrets
              mountPath: /secrets

      containers:
        - name: configure
          # AAP 2.6 EE — ships ansible.controller and ansible.eda collections
          image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              # Read values written by the initContainer into env vars
              export CONTROLLER_HOST=$(cat /secrets/controller-url)
              export CONTROLLER_PASSWORD=$(cat /secrets/controller-password)
              export EDA_HOST=$(cat /secrets/eda-url)
              export EDA_PASSWORD=$(cat /secrets/eda-password)

              echo "Running configure playbook against: $CONTROLLER_HOST"
              ansible-playbook /playbook/configure-aap-resources.yml
          env:
            - name: CONTROLLER_USERNAME
              value: "admin"
            - name: EDA_USERNAME
              value: "admin"
            - name: AAP_ORGANIZATION
              value: "Default"
            - name: AAP_PROJECT_NAME
              value: "IMS Remediation"
            - name: AAP_INVENTORY_NAME
              value: "IMS Remediation Inventory"
            - name: AAP_JOB_TEMPLATE_NAME
              value: "IMS Remediation - Lightspeed Playbook Generator"
            - name: AAP_PROJECT_SCM_URL
              value: "https://github.com/saahmd/IMS-Anomaly-Remediation.git"
            - name: AAP_PROJECT_BRANCH
              value: "main"
          volumeMounts:
            - name: playbook
              mountPath: /playbook
            - name: secrets
              mountPath: /secrets

      volumes:
        - name: playbook
          configMap:
            name: ims-remediation-configure-playbook
        - name: secrets
          emptyDir:
            medium: Memory
