apiVersion: batch/v1
kind: Job
metadata:
  name: ims-remediation-configure
  namespace: aap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "33"
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: ims-remediation-bootstrap
      containers:
        - name: configure
          image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              # ── Kubernetes API helpers ──────────────────────────────────────
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"

              k8s_get() {
                curl -sf --cacert "$CA" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Accept: application/json" \
                  "${API}${1}"
              }

              # ── Read AAP passwords from operator-created secrets ────────────
              echo "[1/3] Reading AAP passwords from Kubernetes secrets..."

              export CONTROLLER_PASSWORD
              CONTROLLER_PASSWORD=$(k8s_get "/api/v1/namespaces/aap/secrets/aap-controller-admin-password" \
                | python3 -c "import sys,json,base64; \
                    d=json.load(sys.stdin)['data']['password']; \
                    print(base64.b64decode(d).decode().strip())")

              export EDA_PASSWORD
              EDA_PASSWORD=$(k8s_get "/api/v1/namespaces/aap/secrets/aap-eda-admin-password" \
                | python3 -c "import sys,json,base64; \
                    d=json.load(sys.stdin)['data']['password']; \
                    print(base64.b64decode(d).decode().strip())")

              # ── Discover Controller and EDA services ────────────────────────
              echo "[2/3] Discovering AAP service URLs..."

              # List all services in the aap namespace and find by label
              SERVICES=$(k8s_get "/api/v1/namespaces/aap/services")

              # Controller service: label app.kubernetes.io/component=automationcontroller
              CONTROLLER_SVC=$(echo "$SERVICES" | python3 -c "
              import sys, json
              items = json.load(sys.stdin)['items']
              for svc in items:
                  labels = svc.get('metadata', {}).get('labels', {})
                  name   = svc['metadata']['name']
                  if labels.get('app.kubernetes.io/component') == 'automationcontroller' \
                  or 'controller' in name:
                      print(name)
                      break
              ")

              # EDA service: label app.kubernetes.io/component=eda
              EDA_SVC=$(echo "$SERVICES" | python3 -c "
              import sys, json
              items = json.load(sys.stdin)['items']
              for svc in items:
                  labels = svc.get('metadata', {}).get('labels', {})
                  name   = svc['metadata']['name']
                  if labels.get('app.kubernetes.io/component') == 'eda' \
                  or ('eda' in name and 'api' in name):
                      print(name)
                      break
              ")

              export CONTROLLER_HOST="https://${CONTROLLER_SVC}.aap.svc.cluster.local"
              export EDA_HOST="https://${EDA_SVC}.aap.svc.cluster.local"

              echo "  Controller : ${CONTROLLER_HOST}"
              echo "  EDA        : ${EDA_HOST}"

              # ── Run the configuration playbook ──────────────────────────────
              echo "[3/3] Running AAP configuration playbook..."
              ansible-playbook /playbook/configure-aap-resources.yml

          env:
            - name: CONTROLLER_USERNAME
              value: "admin"
            - name: EDA_USERNAME
              value: "admin"
            - name: AAP_ORGANIZATION
              value: "Default"
            - name: AAP_PROJECT_NAME
              value: "IMS Remediation"
            - name: AAP_INVENTORY_NAME
              value: "IMS Remediation Inventory"
            - name: AAP_JOB_TEMPLATE_NAME
              value: "IMS Remediation - Lightspeed Playbook Generator"
            - name: AAP_PROJECT_SCM_URL
              value: "https://github.com/saahmd/IMS-Anomaly-Remediation.git"
            - name: AAP_PROJECT_BRANCH
              value: "main"
          volumeMounts:
            - name: playbook
              mountPath: /playbook
      volumes:
        - name: playbook
          configMap:
            name: ims-remediation-configure-playbook
