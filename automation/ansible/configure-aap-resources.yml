---
# Idempotent configuration-as-code playbook for IMS Remediation AAP resources.
# Uses the ansible.controller and ansible.eda collections that ship inside
# the AAP 2.6 ee-supported-rhel9 execution environment image.
# Run once by the ims-remediation-configure PostSync Job after ArgoCD sync.

- name: Configure AAP Controller resources for IMS Remediation
  hosts: localhost
  gather_facts: false
  vars:
    controller_host:          "{{ lookup('env', 'CONTROLLER_HOST')     | default('https://aap-controller-service.aap.svc.cluster.local', true) }}"
    controller_username:      "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password:      "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: false

    organization_name: "{{ lookup('env', 'AAP_ORGANIZATION')      | default('Default', true) }}"
    project_name:      "{{ lookup('env', 'AAP_PROJECT_NAME')      | default('IMS Remediation', true) }}"
    inventory_name:    "{{ lookup('env', 'AAP_INVENTORY_NAME')    | default('IMS Remediation Inventory', true) }}"
    template_name:     "{{ lookup('env', 'AAP_JOB_TEMPLATE_NAME') | default('IMS Remediation - Lightspeed Playbook Generator', true) }}"
    scm_url:           "{{ lookup('env', 'AAP_PROJECT_SCM_URL')   | default('https://github.com/saahmd/IMS-Anomaly-Remediation.git', true) }}"
    scm_branch:        "{{ lookup('env', 'AAP_PROJECT_BRANCH')    | default('main', true) }}"

  tasks:
    - name: Ensure IMS Remediation SCM project exists in Controller
      ansible.controller.project:
        name:                 "{{ project_name }}"
        organization:         "{{ organization_name }}"
        description:          "IMS Remediation automation — Ansible Lightspeed playbook generator"
        scm_type:             git
        scm_url:              "{{ scm_url }}"
        scm_branch:           "{{ scm_branch }}"
        scm_update_on_launch: true
        wait:                 true
        state:                present
        controller_host:      "{{ controller_host }}"
        controller_username:  "{{ controller_username }}"
        controller_password:  "{{ controller_password }}"
        validate_certs:       "{{ controller_validate_certs }}"

    - name: Ensure IMS Remediation inventory exists in Controller
      ansible.controller.inventory:
        name:                "{{ inventory_name }}"
        organization:        "{{ organization_name }}"
        description:         "Local execution inventory for IMS Remediation Lightspeed jobs"
        state:               present
        controller_host:     "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs:      "{{ controller_validate_certs }}"

    - name: Ensure localhost host exists in inventory
      ansible.controller.host:
        name:      localhost
        inventory: "{{ inventory_name }}"
        variables:
          ansible_connection:         local
          ansible_python_interpreter: /usr/bin/python3
        state:               present
        controller_host:     "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs:      "{{ controller_validate_certs }}"

    - name: Ensure IMS Remediation job template exists in Controller
      ansible.controller.job_template:
        name:                   "{{ template_name }}"
        job_type:               run
        organization:           "{{ organization_name }}"
        inventory:              "{{ inventory_name }}"
        project:                "{{ project_name }}"
        playbook:               automation/ansible/playbooks/ims-remediation.yaml
        description: >-
          Calls the Ansible Lightspeed API with lightspeed_prompt and returns
          a generated playbook. Triggered by Kafka EDA events.
        ask_variables_on_launch: true
        extra_vars:
          input_lightspeed_url: https://c.ai.ansible.redhat.com/api/v0/ai/generations/
          lightspeed_wca_token: ""
          lightspeed_prompt:    ""
        verbosity:             1
        state:                 present
        controller_host:       "{{ controller_host }}"
        controller_username:   "{{ controller_username }}"
        controller_password:   "{{ controller_password }}"
        validate_certs:        "{{ controller_validate_certs }}"

    - name: Report Controller configuration result
      ansible.builtin.debug:
        msg:
          - "Project  : {{ project_name }}"
          - "Inventory: {{ inventory_name }}"
          - "Template : {{ template_name }}"
          - "Status   : configured"


- name: Configure EDA resources for IMS Remediation
  hosts: localhost
  gather_facts: false
  vars:
    eda_host:           "{{ lookup('env', 'EDA_HOST')           | default('https://aap-eda-api-svc.aap.svc.cluster.local', true) }}"
    eda_username:       "{{ lookup('env', 'EDA_USERNAME')       | default('admin', true) }}"
    eda_password:       "{{ lookup('env', 'EDA_PASSWORD') }}"
    eda_validate_certs: false

    controller_host:     "{{ lookup('env', 'CONTROLLER_HOST')     | default('https://aap-controller-service.aap.svc.cluster.local', true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"

    organization_name:   "{{ lookup('env', 'AAP_ORGANIZATION') | default('Default', true) }}"
    template_name:       "{{ lookup('env', 'AAP_JOB_TEMPLATE_NAME') | default('IMS Remediation - Lightspeed Playbook Generator', true) }}"
    scm_url:             "{{ lookup('env', 'AAP_PROJECT_SCM_URL') | default('https://github.com/saahmd/IMS-Anomaly-Remediation.git', true) }}"
    scm_branch:          "{{ lookup('env', 'AAP_PROJECT_BRANCH') | default('main', true) }}"

  tasks:
    - name: Ensure EDA project exists (points to ims-remediation repo)
      ansible.eda.project:
        name:           IMS Remediation Rulebooks
        url:            "{{ scm_url }}"
        description:    "IMS Remediation EDA rulebooks — Kafka trigger for Lightspeed"
        verify_ssl:     false
        state:          present
        aap_hostname:   "{{ eda_host }}"
        aap_username:   "{{ eda_username }}"
        aap_password:   "{{ eda_password }}"
        validate_certs: "{{ eda_validate_certs }}"

    - name: Ensure AAP Controller credential exists in EDA
      ansible.eda.credential:
        name:              aap-controller-remediation-cred
        credential_type:   Red Hat Ansible Automation Platform
        description:       "AAP Controller credential for IMS Remediation EDA activation"
        inputs:
          host:       "{{ controller_host }}"
          username:   "{{ controller_username }}"
          password:   "{{ controller_password }}"
          verify_ssl: false
        state:          present
        aap_hostname:   "{{ eda_host }}"
        aap_username:   "{{ eda_username }}"
        aap_password:   "{{ eda_password }}"
        validate_certs: "{{ eda_validate_certs }}"

    - name: Ensure EDA rulebook activation exists (Kafka → Lightspeed template)
      ansible.eda.rulebook_activation:
        name:         ims-kafka-remediation-trigger
        description:  "Listens on ims-remediation-events Kafka topic and fires AAP template"
        project:      IMS Remediation Rulebooks
        rulebook:     rulebooks/kafka-remediation-trigger.yml
        credentials:
          - aap-controller-remediation-cred
        variables:
          controller_job_template_name: "{{ template_name }}"
          controller_organization_name: "{{ organization_name }}"
          lightspeed_wca_token:         ""
          input_lightspeed_url:         https://c.ai.ansible.redhat.com/api/v0/ai/generations/
        restart_policy: always
        enabled:        true
        state:          present
        aap_hostname:   "{{ eda_host }}"
        aap_username:   "{{ eda_username }}"
        aap_password:   "{{ eda_password }}"
        validate_certs: "{{ eda_validate_certs }}"

    - name: Report EDA configuration result
      ansible.builtin.debug:
        msg:
          - "EDA Project   : IMS Remediation Rulebooks"
          - "EDA Activation: ims-kafka-remediation-trigger"
          - "Kafka topic   : ims-remediation-events (aiops-ansible-playbook-generate-instruction)"
          - "Status        : configured"
