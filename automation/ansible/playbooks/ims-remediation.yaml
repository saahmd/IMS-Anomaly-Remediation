---
- name: Interact with Ansible Lightspeed API and Generate Ansible Playbook
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Send request to AI API
      ansible.builtin.uri:
        url: "{{ input_lightspeed_url | default('https://aap-lightspeed-aap.apps.ocp.4rb7v.sandbox2461.opentlc.com/api/v1/ai/chat/') }}"
        method: POST
        headers:
          Content-Type: "application/json"
          Authorization: "Bearer {{ lightspeed_wca_token | default('admin') }}"
        body_format: json
        body:
          no_tools: true
          query: "{{ lightspeed_query | default('') }}"
          model: "{{ lightspeed_model | default('qwen3-14b') }}"
          system_prompt: "{{ lightspeed_system_prompt | default('You are an Ansible Code generator assistant') }}"
      timeout: 300   # ← Add this — 5 minutes, adjust as needed
      register: response

    - name: Display API response
      ansible.builtin.debug:
        msg: "{{ response.json }}"

    - name: Preserve raw YAML playbook (string)
      ansible.builtin.set_fact:
        lightspeed_playbook_raw: "{{ response.json.playbook }}"

    - name: Set stat on raw playbook YAML
      ansible.builtin.set_stats:
        data:
          lightspeed_playbook: "{{ lightspeed_playbook_raw }}"

    - name: Display Ansible Playbook in JSON
      ansible.builtin.debug:
        msg: "{{ lightspeed_playbook_raw }}"

    - name: Display Ansible Playbook in YAML
      ansible.builtin.debug:
        msg: "{{ lightspeed_playbook_raw | to_nice_yaml(sort_keys=False) }}"
