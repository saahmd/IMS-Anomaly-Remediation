---
- name: Interact with Ansible Lightspeed API and Generate Ansible Playbook
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Build request body
      ansible.builtin.set_fact:
        request_body: >-
          {{
            {
              'no_tools': true,
              'query': lightspeed_prompt | default(''),
              'model': lightspeed_model | default('qwen3-14b'),
              'system_prompt': lightspeed_system_prompt | default('You are an Ansible Code generator assistant')
            } | to_json
          }}

    - name: Debug serialized body (compare this to your curl -d payload)
      ansible.builtin.debug:
        msg: "{{ request_body }}"

    - name: Send request to AI API
      ansible.builtin.uri:
        url: "{{ input_lightspeed_url | default('http://aap-lightspeed-api.aap.svc.cluster.local/api/v1/ai/chat/') }}"
        method: POST
        headers:
          Content-Type: "application/json"
          Authorization: "Bearer {{ lightspeed_token | default('redhat') }}"
        body: "{{ request_body }}"
        timeout: 300
        status_code: 200
      register: response


    - name: Display API response
      ansible.builtin.debug:
        msg: "{{ response.json }}"

    - name: Preserve raw YAML playbook (string)
      ansible.builtin.set_fact:
        lightspeed_playbook_raw: "{{ response.json.response }}"

    - name: Set stat on raw playbook YAML
      ansible.builtin.set_stats:
        data:
          lightspeed_playbook: "{{ lightspeed_playbook_raw }}"

    - name: Display Ansible Playbook in JSON
      ansible.builtin.debug:
        msg: "{{ lightspeed_playbook_raw }}"

    - name: Display Ansible Playbook in YAML
      ansible.builtin.debug:
        msg: "{{ lightspeed_playbook_raw | to_nice_yaml(sort_keys=False) }}"




    - name: Extract raw response string
      ansible.builtin.set_fact:
        raw_response: "{{ response.json.response }}"

    - name: Strip markdown code fences
      ansible.builtin.set_fact:
        clean_yaml_str: >-
          {{
            raw_response
            | regex_replace('```yaml\n?', '')
            | regex_replace('```\n?', '')
            | trim
          }}

    - name: Parse outer YAML envelope
      ansible.builtin.set_fact:
        parsed_envelope: "{{ clean_yaml_str | from_yaml }}"

    - name: Extract callback URL
      ansible.builtin.set_fact:
        callback_url: "{{ parsed_envelope.metadata.callback_url }}"
        correlation_id: "{{ parsed_envelope.metadata.correlation_id }}"

    - name: Extract playbook_yaml block
      ansible.builtin.set_fact:
        extracted_playbook_yaml: "{{ parsed_envelope.playbook_yaml }}"

    - name: Debug extracted values
      ansible.builtin.debug:
        msg:
          callback_url: "{{ callback_url }}"
          correlation_id: "{{ correlation_id }}"
          playbook_yaml_preview: "{{ extracted_playbook_yaml | truncate(200) }}"